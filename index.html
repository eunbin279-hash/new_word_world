<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deconstructed Cell Network</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <h1>Deconstructive Theocentrism</h1>
        <p>Enter a 'Holy' center or concept to begin deconstruction:</p>
        <div class="input-group">
            <input type="text" id="start-word" value="TEMPLE" placeholder="e.g. TEMPLE, GOD, TRUTH">
            <button id="start-btn">Initiate</button>
        </div>
    </div>
    <button id="toggle-btn" class="hidden">Stop Generation</button>
    <canvas id="network-canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
